name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx eslint src --quiet

      - name: Build
        # These are throwaway values just to satisfy the build step in CI —
        # they are never used to talk to a real database or Facebook. Real
        # secrets are supplied by Render at deploy time.
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
          JWT_SECRET: ci-placeholder-secret
          ENCRYPTION_KEY: ci-placeholder-key
          FACEBOOK_VERIFY_TOKEN: placeholder
          FACEBOOK_APP_ID: placeholder
          FACEBOOK_APP_SECRET: placeholder
        run: npm run build
