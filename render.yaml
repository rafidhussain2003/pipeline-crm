services:
  - type: web
    name: pipeline-crm
    runtime: node
    plan: starter
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run db:migrate && npm start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pipeline-crm-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: FACEBOOK_VERIFY_TOKEN
        sync: false
      - key: FACEBOOK_APP_ID
        sync: false
      - key: FACEBOOK_APP_SECRET
        sync: false
      - key: CRON_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production

databases:
  - name: pipeline-crm-db
    plan: starter
    databaseName: pipeline
    user: pipeline
